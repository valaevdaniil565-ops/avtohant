services:
  db:
    image: pgvector/pgvector:pg16
    container_name: hunting_pg
    environment:
      POSTGRES_USER: hunting
      POSTGRES_PASSWORD: hunting
      POSTGRES_DB: hunting
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hunting -d hunting"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  pgdata:
